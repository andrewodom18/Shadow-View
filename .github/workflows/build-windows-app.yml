name: Build Windows App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Optional GitHub release tag to attach the built assets to
        required: false
        type: string
  release:
    types:
      - published
  push:
    branches:
      - dev
      - main

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows USB Bundle
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web_app/package-lock.json

      - name: Install build dependencies
        run: python -m pip install --upgrade pip pyinstaller

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Install web dependencies
        working-directory: web_app
        run: npm ci

      - name: Run web smoke test
        working-directory: web_app
        run: npm test

      - name: Build production web app
        working-directory: web_app
        run: npm run build

      - name: Build Windows EXE
        run: >
          python -m PyInstaller
          --noconfirm
          --onefile
          --windowed
          --name "Shadow View CSV Cleaner"
          --icon "assets/shadow_view_cleaner_icon.ico"
          --add-data "config;config"
          scripts/shadow_view_cleaner_app.py

      - name: Build web app EXE
        run: >
          python -m PyInstaller
          --noconfirm
          --onefile
          --windowed
          --name "Shadow View Web App"
          --icon "assets/shadow_view_cleaner_icon.ico"
          --add-data "config;config"
          --add-data "web_app/dist;web_app/dist"
          scripts/shadow_view_web_app.py

      - name: Create USB bundle
        run: python scripts/create_usb_bundle.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Shadow View CSV Cleaner - Windows
          path: dist/Shadow View CSV Cleaner.exe

      - name: Upload web app EXE
        uses: actions/upload-artifact@v4
        with:
          name: Shadow View Web App - Windows
          path: dist/Shadow View Web App.exe

      - name: Upload USB bundle
        uses: actions/upload-artifact@v4
        with:
          name: Shadow View USB Bundle - Windows
          path: dist/Shadow View USB Bundle

      - name: Attach assets to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Shadow View CSV Cleaner.exe
            dist/Shadow View Web App.exe
            dist/Shadow View USB Bundle.zip

      - name: Attach assets to selected release
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            dist/Shadow View CSV Cleaner.exe
            dist/Shadow View Web App.exe
            dist/Shadow View USB Bundle.zip
