# Co-Traveler CSV Cleaner configuration.
#
# The script uses canonical names internally, but each canonical name can have
# multiple aliases so input exports can change their column wording over time.
# Add new aliases here when a raw CSV header changes.

tool_name = "Co-Traveler CSV Cleaner"

[input_columns]
bssid = ["BSSID"]
ssid = ["SSID"]
accuracy = ["Accuracy"]
event_time = ["Event Time"]
device_name = ["Device Name"]
mgrs = ["MGRS", "Location (MGRS)"]

[sighting_count]
# Used when grouped output is disabled. Grouped output uses [grouping].key.
device_key = "bssid"

[grouping]
# Condense raw rows so there is one cleaned output row per BSSID.
enabled = true
key = "bssid"
multi_value_separator = " | "

[mgrs_unique_count]
# MGRS locations within this distance count as the same device location.
distance_threshold_meters = 50

[[output_columns]]
source = "bssid"
header = "BSSID"
aggregate = "group_key"

[[output_columns]]
source = "ssid"
header = "SSID"
aggregate = "distinct_list"

[[output_columns]]
source = "accuracy"
header = "Accuracy"
aggregate = "average"

[[output_columns]]
source = "event_time"
header = "Event Time"
aggregate = "datetime_range"

[[output_columns]]
source = "device_name"
header = "Device Name"
aggregate = "distinct_list"

[[output_columns]]
computed = "unique_mgrs_count"
header = "MGRS Unique Count"

[sort]
# Sort by MGRS Unique Count greatest to least.
enabled = true
case_sensitive = false
rules = [
  { column = "MGRS Unique Count", direction = "desc", value_type = "number" }
]

[color_coding]
enabled = true
event_time_column = "event_time"
bucket_minutes = 30

# Used when an HTML preview or Excel workbook is requested. CSV files cannot store colors.
palette = [
  "#fff2cc",
  "#d9ead3",
  "#cfe2f3",
  "#eadcf8",
  "#f4cccc",
  "#d0e0e3",
  "#fce5cd",
  "#d9d2e9"
]
